<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FloWrestling Rankings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:#0c0c0c;
color:#f5f5f7;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 50px;
background:#0c0c0c;
border-bottom:2px solid #FF140F;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:26px;
font-weight:700;
color:#FF140F;
}

.nav-links a{
color:#fff;
margin-left:25px;
text-decoration:none;
font-weight:600;
font-size:15px;
transition:.25s;
}

.nav-links a:hover{
color:#FF140F;
}

/* HEADER */

.header{
text-align:center;
padding:60px 20px;
}

.header h1{
font-size:48px;
margin-bottom:10px;
color:#FF140F;
}

.header p{
color:#aaa;
font-size:16px;
}

/* SEARCH */

.search-box{
text-align:center;
margin-bottom:35px;
}

.search-box input{
padding:14px;
width:340px;
border-radius:6px;
border:1px solid #222;
background:#111;
color:white;
font-size:15px;
outline:none;
}

.search-box input:focus{
border:1px solid #FF140F;
}

/* TABLE */

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:#111;
border-radius:8px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,20,15,.15);
}

th{
background:#0c0c0c;
color:#FF140F;
padding:15px;
font-size:14px;
border-bottom:2px solid #FF140F;
}

td{
padding:13px;
border-bottom:1px solid #1c1c1c;
text-align:center;
}

tr:hover{
background:#181818;
}

/* TOP RANK COLORS */

.rank1{color:gold;font-weight:bold}
.rank2{color:silver;font-weight:bold}
.rank3{color:#cd7f32;font-weight:bold}

/* FOOTER */

footer{
text-align:center;
padding:40px;
color:#777;
margin-top:60px;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:34px;
}

nav{
padding:15px;
}

.search input{
width:220px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">FloWrestling</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="rankings.html">Rankings</a>
</div>

</nav>

<section class="hero">

<h1>Roblox Wrestling Rankings</h1>
<p>Community Star Ranking System</p>

</section>

<div class="container">

<div class="search">

<input id="search" placeholder="Search wrestler">

</div>

<div class="rankings">

<table>

<thead>

<tr>
<th>#</th>
<th>Wrestler</th>
<th>Stars</th>
</tr>

</thead>

<tbody id="rankingTable"></tbody>

</table>

</div>

<section class="prospects">

<h2>Top Prospects ⭐⭐⭐</h2>

<div class="prospect-grid" id="prospects"></div>

</section>

</div>

<footer>

FloWrestling Rankings © 2026

</footer>

<script>

/* WRESTLER DATA */

const wrestlers=[

{name:"Lebron",stars:3},
{name:"Jibcoo",stars:3},
{name:"Legenito",stars:3},
{name:"_ncain",stars:3},
{name:"Stranger3aia",stars:3},
{name:"M1x1yana",stars:3},

{name:"Hunt",stars:2},
{name:"Igor (NativeorDrink)",stars:2},
{name:"Celnudy",stars:2},
{name:"Wavy7027",stars:2},
{name:"Deaniswasted",stars:2},
{name:"A1spect",stars:2},
{name:"Hank.67",stars:2},
{name:"Zoron",stars:2},
{name:"Fluxenr",stars:2},
{name:"Perkmusik",stars:2},
{name:"Syonix",stars:2},
{name:"Vxwj",stars:2},
{name:"Yeat",stars:2},
{name:"Kyler Larkin",stars:2},
{name:"Meinky",stars:2},
{name:"Swavvy",stars:2},
{name:"Wyatt (Wywytheman09)",stars:2},

{name:"Cwiggle",stars:1},
{name:"Peterwrestles",stars:1},
{name:"Ceokhii (xrofylol)",stars:1},
{name:"Thug (Clappingc)",stars:1},
{name:"Bells",stars:1},
{name:"Techfaller",stars:1},
{name:"Wes062289",stars:1},
{name:"Big waddle",stars:1},
{name:"Ducfishyx",stars:1},
{name:"Pabloescobar (X4LIFE)",stars:1},
{name:"Dannyblaze",stars:1},
{name:"Golden",stars:1},
{name:"Purxivet (Jason Richardson)",stars:1},
{name:"Aqs (spookylookin,Logan)",stars:1},
{name:"Rgthemanz",stars:1},
{name:"Prismatix",stars:1},
{name:"Cromatix",stars:1},
{name:"Kiki",stars:1},
{name:"RARE",stars:1},
{name:"Stickofbuter",stars:1}

]

/* SORT BY STARS */

wrestlers.sort((a,b)=>b.stars-a.stars)

/* RENDER TABLE */

function render(){

const table=document.getElementById("rankingTable")

table.innerHTML=""

wrestlers.forEach((w,i)=>{

table.innerHTML+=`

<tr>

<td class="rank">${i+1}</td>

<td>${w.name}</td>

<td class="star">${"⭐".repeat(w.stars)}</td>

</tr>

`

})

}

/* TOP PROSPECTS */

function prospects(){

const grid=document.getElementById("prospects")

wrestlers
.filter(w=>w.stars===3)
.forEach(w=>{

grid.innerHTML+=`

<div class="card">

<h3>${w.name}</h3>
<p>⭐⭐⭐ Prospect</p>

</div>

`

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

let term=this.value.toLowerCase()

let rows=document.querySelectorAll("#rankingTable tr")

rows.forEach(r=>{

let name=r.children[1].innerText.toLowerCase()

r.style.display=name.includes(term) ? "" : "none"

})

})

render()
prospects()

</script>

</body>

</html>
