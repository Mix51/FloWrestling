<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FloWrestling Rankings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Inter;
background:#0a0a0a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#111;
border-bottom:2px solid red;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:26px;
font-weight:bold;
color:red;
letter-spacing:1px;
}

.nav-links a{
color:white;
margin-left:25px;
text-decoration:none;
font-weight:bold;
transition:0.2s;
font-size:16px;
}

.nav-links a:hover{
color:red;
}

.logo{
font-size:22px;
font-weight:800;
color:#ff1f1f;
letter-spacing:1px;
}

nav a{
color:#ccc;
text-decoration:none;
margin-left:25px;
font-weight:600;
transition:.2s;
}

nav a:hover{
color:white;
}

/* HERO */

.hero{
text-align:center;
padding:70px 20px 50px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
color:#aaa;
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
padding:12px 15px;
width:300px;
border-radius:6px;
border:none;
background:#141414;
color:white;
outline:none;
}

/* TABLE */

.rankings{
background:#0f0f0f;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#151515;
}

th{
padding:16px;
text-align:left;
color:#aaa;
font-size:14px;
}

td{
padding:16px;
border-top:1px solid #1c1c1c;
}

tr{
transition:.2s;
}

tr:hover{
background:#181818;
}

/* RANK */

.rank{
color:#ff2a2a;
font-weight:800;
}

/* STARS */

.star{
color:#ff2a2a;
font-weight:700;
}

/* TOP PROSPECTS */

.prospects{
margin-top:60px;
}

.prospects h2{
margin-bottom:20px;
}

.prospect-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:16px;
}

.card{
background:#111;
border:1px solid #222;
padding:20px;
border-radius:10px;
text-align:center;
transition:.25s;
}

.card:hover{
background:#181818;
transform:translateY(-4px);
border-color:#ff1f1f;
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:34px;
}

nav{
padding:15px;
}

.search input{
width:220px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">FloWrestling</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="rankings.html">Rankings</a>
</div>

</nav>

<section class="hero">

<h1>Roblox Wrestling Rankings</h1>
<p>Community Star Ranking System</p>

</section>

<div class="container">

<div class="search">

<input id="search" placeholder="Search wrestler">

</div>

<div class="rankings">

<table>

<thead>

<tr>
<th>#</th>
<th>Wrestler</th>
<th>Stars</th>
</tr>

</thead>

<tbody id="rankingTable"></tbody>

</table>

</div>

<section class="prospects">

<h2>Top Prospects ⭐⭐⭐</h2>

<div class="prospect-grid" id="prospects"></div>

</section>

</div>

<footer>

FloWrestling Rankings © 2026

</footer>

<script>

/* WRESTLER DATA */

const wrestlers=[

{name:"Lebron",stars:3},
{name:"Jibcoo",stars:3},
{name:"Legenito",stars:3},
{name:"_ncain",stars:3},
{name:"Stranger3aia",stars:3},
{name:"M1x1yana",stars:3},

{name:"Hunt",stars:2},
{name:"Igor (NativeorDrink)",stars:2},
{name:"Celnudy",stars:2},
{name:"Wavy7027",stars:2},
{name:"Deaniswasted",stars:2},
{name:"A1spect",stars:2},
{name:"Hank.67",stars:2},
{name:"Zoron",stars:2},
{name:"Fluxenr",stars:2},
{name:"Perkmusik",stars:2},
{name:"Syonix",stars:2},
{name:"Vxwj",stars:2},
{name:"Yeat",stars:2},
{name:"Kyler Larkin",stars:2},
{name:"Meinky",stars:2},
{name:"Swavvy",stars:2},
{name:"Wyatt (Wywytheman09)",stars:2},

{name:"Cwiggle",stars:1},
{name:"Peterwrestles",stars:1},
{name:"Ceokhii (xrofylol)",stars:1},
{name:"Thug (Clappingc)",stars:1},
{name:"Bells",stars:1},
{name:"Techfaller",stars:1},
{name:"Wes062289",stars:1},
{name:"Big waddle",stars:1},
{name:"Ducfishyx",stars:1},
{name:"Pabloescobar (X4LIFE)",stars:1},
{name:"Dannyblaze",stars:1},
{name:"Golden",stars:1},
{name:"Purxivet (Jason Richardson)",stars:1},
{name:"Aqs (spookylookin,Logan)",stars:1},
{name:"Rgthemanz",stars:1},
{name:"Prismatix",stars:1},
{name:"Cromatix",stars:1},
{name:"Kiki",stars:1},
{name:"RARE",stars:1},
{name:"Stickofbuter",stars:1}

]

/* SORT BY STARS */

wrestlers.sort((a,b)=>b.stars-a.stars)

/* RENDER TABLE */

function render(){

const table=document.getElementById("rankingTable")

table.innerHTML=""

wrestlers.forEach((w,i)=>{

table.innerHTML+=`

<tr>

<td class="rank">${i+1}</td>

<td>${w.name}</td>

<td class="star">${"⭐".repeat(w.stars)}</td>

</tr>

`

})

}

/* TOP PROSPECTS */

function prospects(){

const grid=document.getElementById("prospects")

wrestlers
.filter(w=>w.stars===3)
.forEach(w=>{

grid.innerHTML+=`

<div class="card">

<h3>${w.name}</h3>
<p>⭐⭐⭐ Prospect</p>

</div>

`

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

let term=this.value.toLowerCase()

let rows=document.querySelectorAll("#rankingTable tr")

rows.forEach(r=>{

let name=r.children[1].innerText.toLowerCase()

r.style.display=name.includes(term) ? "" : "none"

})

})

render()
prospects()

</script>

</body>

</html>
