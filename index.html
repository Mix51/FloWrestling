<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FloWrestling Rankings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */

body{
margin:0;
font-family:Inter;
background:#0b0b0b;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#000;
border-bottom:1px solid #1f1f1f;
}

.logo{
font-size:22px;
font-weight:800;
color:#d4af37;
}

nav a{
color:#aaa;
text-decoration:none;
margin-left:25px;
font-weight:600;
transition:.2s;
}

nav a:hover{
color:white;
}

/* HERO */

.hero{
text-align:center;
padding:70px 20px 40px;
}

.hero h1{
font-size:46px;
margin-bottom:8px;
}

.hero p{
color:#888;
}

/* CONTAINER */

.container{
width:90%;
max-width:1100px;
margin:auto;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:35px;
}

.search input{
padding:12px 15px;
width:280px;
border-radius:6px;
border:none;
background:#161616;
color:white;
}

/* RANK TABLE */

.rankings{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.6);
}

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#181818;
}

th{
text-align:left;
padding:16px;
font-size:14px;
color:#bbb;
}

td{
padding:16px;
border-top:1px solid #1c1c1c;
}

tr{
transition:.2s;
}

tr:hover{
background:#1a1a1a;
}

/* RANK NUMBER */

.rank{
font-weight:800;
color:#d4af37;
}

/* STARS */

.star{
color:#d4af37;
font-weight:700;
}

/* PROSPECTS */

.prospects{
margin-top:60px;
}

.prospects h2{
margin-bottom:20px;
}

.prospect-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:#111;
border:1px solid #222;
padding:20px;
border-radius:10px;
text-align:center;
transition:.2s;
}

.card:hover{
background:#181818;
transform:translateY(-4px);
}

/* FOOTER */

footer{
margin-top:80px;
padding:30px;
text-align:center;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:34px;
}

nav{
padding:15px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">FloWrestling</div>

<div>
<a href="#">Rankings</a>
<a href="#">Community</a>
</div>

</nav>

<section class="hero">

<h1>Roblox Wrestling Rankings</h1>
<p>Community Star Rankings</p>

</section>

<div class="container">

<div class="search">
<input id="search" placeholder="Search wrestler...">
</div>

<div class="rankings">

<table>

<thead>
<tr>
<th>#</th>
<th>Wrestler</th>
<th>Stars</th>
</tr>
</thead>

<tbody id="rankingTable"></tbody>

</table>

</div>

<section class="prospects">

<h2>Top Prospects ⭐⭐⭐</h2>

<div class="prospect-grid" id="prospects"></div>

</section>

</div>

<footer>

FloWrestling Rankings © 2026

</footer>

<script>

/* WRESTLER LIST */

const wrestlers=[

{name:"Lebron",stars:3},
{name:"Jibcoo",stars:3},
{name:"Legenito",stars:3},
{name:"_ncain",stars:3},
{name:"Stranger3aia",stars:3},
{name:"M1x1yana",stars:3},

{name:"Hunt",stars:2},
{name:"Igor (NativeorDrink)",stars:2},
{name:"Celnudy",stars:2},
{name:"Wavy7027",stars:2},
{name:"Deaniswasted",stars:2},
{name:"A1spect",stars:2},
{name:"Hank.67",stars:2},
{name:"Zoron",stars:2},
{name:"Fluxenr",stars:2},
{name:"Perkmusik",stars:2},
{name:"Syonix",stars:2},
{name:"Vxwj",stars:2},
{name:"Yeat",stars:2},
{name:"Kyler Larkin",stars:2},
{name:"Meinky",stars:2},
{name:"Swavvy",stars:2},
{name:"Wyatt (Wywytheman09)",stars:2},

{name:"Cwiggle",stars:1},
{name:"Peterwrestles",stars:1},
{name:"Ceokhii (xrofylol)",stars:1},
{name:"Thug (Clappingc)",stars:1},
{name:"Bells",stars:1},
{name:"Techfaller",stars:1},
{name:"Wes062289",stars:1},
{name:"Big waddle",stars:1},
{name:"Ducfishyx",stars:1},
{name:"Pabloescobar (X4LIFE)",stars:1},
{name:"Dannyblaze",stars:1},
{name:"Golden",stars:1},
{name:"Purxivet (Jason Richardson)",stars:1},
{name:"Aqs (spookylookin,Logan)",stars:1},
{name:"Rgthemanz",stars:1},
{name:"Prismatix",stars:1},
{name:"Cromatix",stars:1},
{name:"Kiki",stars:1},
{name:"RARE",stars:1},
{name:"Stickofbuter",stars:1}

]

/* SORT BY STARS */

wrestlers.sort((a,b)=>b.stars-a.stars)

/* RENDER TABLE */

function render(){

const table=document.getElementById("rankingTable")

table.innerHTML=""

wrestlers.forEach((w,i)=>{

table.innerHTML+=`

<tr>

<td class="rank">${i+1}</td>

<td>${w.name}</td>

<td class="star">${"⭐".repeat(w.stars)}</td>

</tr>

`

})

}

/* PROSPECTS */

function prospects(){

const grid=document.getElementById("prospects")

wrestlers
.filter(w=>w.stars===3)
.forEach(w=>{

grid.innerHTML+=`

<div class="card">

<h3>${w.name}</h3>
<p>⭐⭐⭐ Prospect</p>

</div>

`

})

}

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

let term=this.value.toLowerCase()

let rows=document.querySelectorAll("#rankingTable tr")

rows.forEach(r=>{

let name=r.children[1].innerText.toLowerCase()

r.style.display=name.includes(term) ? "" : "none"

})

})

render()
prospects()

</script>

</body>

</html>
